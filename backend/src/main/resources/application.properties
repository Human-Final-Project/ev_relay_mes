spring.application.name=ev-relay-mes

# 1. Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/mes_hm_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=root

#
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 2-1. Initial master data
# Hibernate creates the schema first, then Spring runs data.sql on every startup.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# 3. Server Port
server.port=8111

# 4. OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.csrf.enabled=true

# 5. Automatic LOT lifecycle recovery
# Normal flow runs immediately through transaction events; these schedules are recovery safety nets.
mes.auto-lot.reconcile-enabled=true
mes.auto-lot.reconcile-initial-delay-ms=5000
mes.auto-lot.reconcile-delay-ms=5000
mes.auto-lot.material-reconcile-enabled=true
mes.auto-lot.material-reconcile-initial-delay-ms=5000
mes.auto-lot.material-reconcile-delay-ms=5000
